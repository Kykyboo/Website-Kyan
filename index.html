<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER // OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/all.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --border: #1a1a1a;
            --text: #ffffff;
            --muted: #666666;
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; }

        /* Custom Login Screen */
        #auth-screen {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        .login-card {
            background: var(--card); border: 1px solid var(--border);
            padding: 3rem; border-radius: 12px; text-align: center; width: 100%; max-width: 400px;
        }
        .login-card h1 { margin-bottom: 2rem; letter-spacing: -1px; }

        /* Main App Layout */
        #app-container { display: none; height: 100vh; }
        .layout { display: flex; height: 100%; }

        aside {
            width: 260px; border-right: 1px solid var(--border);
            padding: 2rem 1.5rem; display: flex; flex-direction: column;
        }
        .nav-item {
            padding: 12px; color: var(--muted); cursor: pointer; border-radius: 8px;
            margin-bottom: 8px; transition: 0.2s; display: flex; align-items: center; gap: 12px;
            font-size: 0.9rem; font-weight: 500;
        }
        .nav-item:hover, .nav-item.active { background: #111; color: #fff; }
        .nav-item.active { border: 1px solid var(--border); }

        main { flex-grow: 1; padding: 4rem; overflow-y: auto; }
        .view { display: none; max-width: 900px; margin: 0 auto; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }

        /* Widgets & Tools */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 1.5rem; border-radius: 12px; }
        
        input {
            background: transparent; border: 1px solid var(--border); color: #fff;
            padding: 12px; border-radius: 8px; width: 100%; outline: none; margin-bottom: 1rem;
        }
        .btn {
            background: #fff; color: #000; border: none; padding: 12px 24px;
            border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%;
        }

        /* Snake Game UI */
        #game-canvas { background: #000; border: 1px solid var(--border); display: block; margin: 0 auto; border-radius: 8px; }

        /* Pomodoro UI */
        .timer-display { font-size: 4rem; font-weight: 700; text-align: center; margin: 1rem 0; font-variant-numeric: tabular-nums; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="login-card">
            <h1>AETHER<span style="color:var(--accent)">.</span></h1>
            <div id="clerk-signin"></div>
            <p style="margin-top: 1.5rem; font-size: 0.8rem; color: var(--muted)">Secure access via Clerk Auth</p>
        </div>
    </div>

    <div id="app-container">
        <div class="layout">
            <aside>
                <h2 style="margin-bottom: 3rem; letter-spacing: -1px;">AETHER</h2>
                <nav>
                    <div class="nav-item active" onclick="router.nav('dash', this)"><i class="fas fa-th-large"></i> Dashboard</div>
                    <div class="nav-item" onclick="router.nav('game', this)"><i class="fas fa-gamepad"></i> Game Area</div>
                    <div class="nav-item" onclick="router.nav('tools', this)"><i class="fas fa-screwdriver-wrench"></i> Focus Tools</div>
                </nav>
                <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;">
                    <div id="clerk-user"></div>
                    <button onclick="Clerk.signOut()" style="background:none; border:none; color:var(--muted); cursor:pointer"><i class="fas fa-power-off"></i></button>
                </div>
            </aside>

            <main>
                <div id="v-dash" class="view active">
                    <h1 style="margin-bottom: 2rem;">Overview</h1>
                    <div class="grid">
                        <div class="card">
                            <h3>Notes</h3>
                            <input type="text" id="note-in" placeholder="Quick thought...">
                            <button class="btn" onclick="app.addNote()">Add Note</button>
                            <div id="notes-list" style="margin-top:1.5rem"></div>
                        </div>
                        <div class="card">
                            <h3>Tasks</h3>
                            <input type="text" id="task-in" placeholder="To do...">
                            <button class="btn" onclick="app.addTask()">Add Task</button>
                            <div id="tasks-list" style="margin-top:1.5rem"></div>
                        </div>
                    </div>
                </div>

                <div id="v-game" class="view">
                    <h1 style="margin-bottom: 2rem;">Arcade</h1>
                    <div class="card" style="text-align: center;">
                        <p style="margin-bottom: 1rem; color: var(--muted)">Use Arrow Keys to play Snake</p>
                        <canvas id="game-canvas" width="400" height="400"></canvas>
                        <button class="btn" style="margin-top: 1rem; width: auto;" onclick="game.start()">Start New Game</button>
                    </div>
                </div>

                <div id="v-tools" class="view">
                    <h1 style="margin-bottom: 2rem;">Handy Tools</h1>
                    <div class="card" style="max-width: 400px; margin: 0 auto; text-align: center;">
                        <h3>Pomodoro Timer</h3>
                        <div class="timer-display" id="timer">25:00</div>
                        <div style="display:flex; gap: 10px;">
                            <button class="btn" onclick="tools.startTimer()">Start</button>
                            <button class="btn" style="background:#111; color:#fff" onclick="tools.resetTimer()">Reset</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script 
        async crossorigin="anonymous" 
        data-clerk-publishable-key="pk_live_Y2xlcmsuMW55eHgxLm5sJA" 
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" 
        type="text/javascript">
    </script>

    <script>
        const router = {
            nav: (id, el) => {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById('v-'+id).classList.add('active');
                el.classList.add('active');
            }
        };

        const app = {
            init: () => {
                app.render('notes');
                app.render('tasks');
            },
            addNote: () => {
                const val = document.getElementById('note-in').value;
                if(!val) return;
                const notes = JSON.parse(localStorage.getItem('n') || '[]');
                notes.unshift({id: Date.now(), txt: val});
                localStorage.setItem('n', JSON.stringify(notes));
                document.getElementById('note-in').value = '';
                app.render('notes');
            },
            addTask: () => {
                const val = document.getElementById('task-in').value;
                if(!val) return;
                const tasks = JSON.parse(localStorage.getItem('t') || '[]');
                tasks.unshift({id: Date.now(), txt: val});
                localStorage.setItem('t', JSON.stringify(tasks));
                document.getElementById('task-in').value = '';
                app.render('tasks');
            },
            render: (type) => {
                const data = JSON.parse(localStorage.getItem(type === 'notes' ? 'n' : 't') || '[]');
                document.getElementById(type+'-list').innerHTML = data.map(i => `
                    <div style="padding: 10px 0; border-bottom: 1px solid #111; font-size: 0.9rem; display:flex; justify-content:space-between">
                        ${i.txt}
                    </div>
                `).join('');
            }
        };

        const tools = {
            timeLeft: 1500,
            interval: null,
            startTimer: () => {
                if(tools.interval) return;
                tools.interval = setInterval(() => {
                    tools.timeLeft--;
                    const mins = Math.floor(tools.timeLeft / 60);
                    const secs = tools.timeLeft % 60;
                    document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                    if(tools.timeLeft <= 0) clearInterval(tools.interval);
                }, 1000);
            },
            resetTimer: () => {
                clearInterval(tools.interval);
                tools.interval = null;
                tools.timeLeft = 1500;
                document.getElementById('timer').innerText = "25:00";
            }
        };

        // SNAKE GAME LOGIC
        const game = {
            canvas: null, ctx: null, snake: [{x:10, y:10}], food: {x:15, y:15}, dx: 0, dy: 0,
            start: () => {
                game.canvas = document.getElementById('game-canvas');
                game.ctx = game.canvas.getContext('2d');
                game.dx = 1; game.dy = 0;
                if(window.gLoop) clearInterval(window.gLoop);
                window.gLoop = setInterval(game.tick, 100);
            },
            tick: () => {
                const head = {x: game.snake[0].x + game.dx, y: game.snake[0].y + game.dy};
                game.snake.unshift(head);
                if(head.x === game.food.x && head.y === game.food.y) {
                    game.food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
                } else { game.snake.pop(); }
                
                game.ctx.fillStyle = "black"; game.ctx.fillRect(0,0,400,400);
                game.ctx.fillStyle = "#3b82f6";
                game.snake.forEach(s => game.ctx.fillRect(s.x*20, s.y*20, 18, 18));
                game.ctx.fillStyle = "white";
                game.ctx.fillRect(game.food.x*20, game.food.y*20, 18, 18);
            }
        };

        window.addEventListener('keydown', e => {
            if(e.key === "ArrowUp" && game.dy === 0) { game.dx = 0; game.dy = -1; }
            if(e.key === "ArrowDown" && game.dy === 0) { game.dx = 0; game.dy = 1; }
            if(e.key === "ArrowLeft" && game.dx === 0) { game.dx = -1; game.dy = 0; }
            if(e.key === "ArrowRight" && game.dx === 0) { game.dx = 1; game.dy = 0; }
        });

        window.addEventListener('load', async () => {
            await Clerk.load();
            if (Clerk.user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                Clerk.mountUserButton(document.getElementById('clerk-user'));
                app.init();
            } else {
                Clerk.mountSignIn(document.getElementById('clerk-signin'));
            }
        });
    </script>
</body>
</html>
