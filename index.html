<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vriendelijke Verklaring</title>

<style>
  body {
    margin: 0;
    font-family: system-ui, Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .card {
    width: 95%;
    max-width: 520px;
    background: rgba(17, 24, 39, 0.9);
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 25px 70px rgba(0,0,0,0.5);
    border: 1px solid rgba(148,163,184,0.2);
  }

  h1 {
    margin: 0 0 10px;
    font-size: 20px;
  }

  p {
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.4;
  }

  .note {
    background: rgba(34, 197, 94, 0.1);
    border: 1px solid rgba(34, 197, 94, 0.3);
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 15px;
    font-size: 13px;
  }

  input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 12px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #0b1220;
    color: white;
    outline: none;
    resize: none;
  }

  canvas {
    width: 100%;
    height: 160px;
    background: white;
    border-radius: 12px;
    margin-top: 8px;
    touch-action: none;
  }

  .buttons {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  button {
    flex: 1;
    padding: 11px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
  }

  .clear {
    background: #ef4444;
    color: white;
  }

  .send {
    background: #22c55e;
    color: black;
  }

  #status {
    margin-top: 12px;
    font-size: 13px;
    color: #38bdf8;
    min-height: 18px;
  }
</style>
</head>

<body>

<div class="card">
  <h1>Vriendelijke Verklaring</h1>

  <div class="note">
    💚 We gaan altijd lief met elkaar om.  
    Dingen die gezegd worden zijn niet bedoeld om te kwetsen of letterlijk te nemen.
  </div>

  <input id="name" placeholder="Naam" />

  <textarea id="wish" placeholder="Wat wil je heel graag doen?"></textarea>

  <textarea id="dislike" placeholder="Zijn er dingen die je niet leuk vindt die gezegd worden?"></textarea>

  <p style="margin-bottom:6px;">Handtekening:</p>
  <canvas id="canvas"></canvas>

  <div class="buttons">
    <button class="clear" onclick="clearCanvas()">Wissen</button>
    <button class="send" onclick="send()">Verzenden</button>
  </div>

  <div id="status"></div>
</div>

<script>
/* ===== CONFIG ===== */
const WEBHOOK_URL = "https://discord.com/api/webhooks/1493220086293594112/s5MCC-PimsJasjc9vGeC2o-I8ebtRApxtbuTPlFLL7bd8gatVCYdObKDl7QgSYYNkyVt";
/* =================== */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resize();
window.addEventListener("resize", resize);

let drawing = false;

function pos(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (e.touches ? e.touches[0].clientX : e.clientX) - r.left,
    y: (e.touches ? e.touches[0].clientY : e.clientY) - r.top
  };
}

function start(e) {
  drawing = true;
  const p = pos(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
}

function draw(e) {
  if (!drawing) return;
  const p = pos(e);

  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.strokeStyle = "#000";

  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
}

function end() {
  drawing = false;
}

canvas.addEventListener("mousedown", start);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", end);
canvas.addEventListener("mouseout", end);

canvas.addEventListener("touchstart", start);
canvas.addEventListener("touchmove", draw);
canvas.addEventListener("touchend", end);

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

async function send() {
  const status = document.getElementById("status");

  const data = {
    name: document.getElementById("name").value,
    wish: document.getElementById("wish").value,
    dislikes: document.getElementById("dislike").value,
    signature: canvas.toDataURL("image/png"),
    timestamp: new Date().toISOString(),
    note: "Alle uitspraken zijn bedoeld in een vriendelijke context en niet letterlijk of negatief bedoeld."
  };

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(data)
    });

    if (res.ok) {
      status.innerText = "✔ Verstuurd!";
    } else {
      status.innerText = "❌ Er ging iets mis.";
    }
  } catch (e) {
    status.innerText = "❌ Webhook fout.";
  }
}
</script>

</body>
</html>
