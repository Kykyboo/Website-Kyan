<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER // OS</title>
    <script src="https://kit.fontawesome.com/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #0a0a0a; --border: #1a1a1a; --text: #fff; --accent: #3b82f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* De Danteh Style Container */
        #root { height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .dashboard-layout { display: flex; width: 100vw; height: 100vh; background: var(--bg); }
        
        aside { 
            width: 260px; border-right: 1px solid var(--border); padding: 2rem; 
            display: flex; flex-direction: column; 
        }

        .nav-item { 
            padding: 12px; color: #666; cursor: pointer; border-radius: 8px; 
            margin-bottom: 8px; display: flex; align-items: center; gap: 12px; 
        }
        .nav-item.active { background: #111; color: #fff; border: 1px solid var(--border); }

        main { flex-grow: 1; padding: 4rem; overflow-y: auto; }
        
        /* Clerk Overrides voor Danteh Look */
        .cl-card { background: var(--card) !important; border: 1px solid var(--border) !important; }
        .cl-headerTitle { color: white !important; }
        .cl-headerSubtitle { color: #666 !important; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script 
        async crossorigin="anonymous" 
        data-clerk-publishable-key="pk_live_Y2xlcmsuMW55eHgxLm5sJA" 
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js">
    </script>

    <script>
        const PUBLISHABLE_KEY = "pk_live_Y2xlcmsuMW55eHgxLm5sJA";

        window.addEventListener('load', async () => {
            await Clerk.load();

            const rootDiv = document.getElementById('root');

            if (Clerk.user) {
                // DASHBOARD RENDEREN
                renderDashboard(rootDiv);
            } else {
                // LOGIN RENDEREN
                rootDiv.innerHTML = `<div id="signin-container"></div>`;
                Clerk.mountSignIn(document.getElementById('signin-container'), {
                    appearance: {
                        variables: { colorPrimary: '#3b82f6', colorBackground: '#0a0a0a', colorText: '#fff' }
                    }
                });
            }
        });

        function renderDashboard(container) {
            container.innerHTML = `
                <div class="dashboard-layout">
                    <aside>
                        <h2 style="margin-bottom: 2rem; letter-spacing: -1px;">AETHER</h2>
                        <nav>
                            <div class="nav-item active"><i class="fas fa-th-large"></i> Dashboard</div>
                            <div class="nav-item" id="game-btn"><i class="fas fa-gamepad"></i> Arcade</div>
                        </nav>
                        <div style="margin-top: auto; display:flex; align-items:center; justify-content:space-between">
                            <div id="user-button"></div>
                            <button onclick="Clerk.signOut()" style="background:none; border:none; color:#444; cursor:pointer"><i class="fas fa-power-off"></i></button>
                        </div>
                    </aside>
                    <main>
                        <h1>Dashboard</h1>
                        <p style="color: #666; margin-top: 1rem;">Welkom, ${Clerk.user.firstName}!</p>
                        
                        <div style="margin-top: 3rem; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                            <div style="background: #0a0a0a; border: 1px solid #111; padding: 2rem; border-radius: 12px;">
                                <h3>Snake Highscore</h3>
                                <p style="font-size: 2rem; font-weight: bold; margin-top: 1rem;">1,240</p>
                            </div>
                            <div style="background: #0a0a0a; border: 1px solid #111; padding: 2rem; border-radius: 12px;">
                                <h3>Focus Time</h3>
                                <p style="font-size: 2rem; font-weight: bold; margin-top: 1rem;">42h</p>
                            </div>
                        </div>
                    </main>
                </div>
            `;
            Clerk.mountUserButton(document.getElementById('user-button'));
        }
    </script>
</body>
</html>
